version: '3.8'

services:
  gopdf-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./fonts:/app/fonts:ro
      - ./downloads:/app/downloads
    environment:
      - PORT=8080
      - FONT_DIR=/app/fonts
      - TEMP_DIR=/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gopdf-generator
    profiles:
      - with-proxy